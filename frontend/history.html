<head>

    <link rel="stylesheet" href="./statics/plugins/bootstrap-5.3.8/css/bootstrap.min.css">
    <link rel="stylesheet" href="./statics/plugins/fontawesome-free-7.2.0-web/css/all.min.css">

<body>

            </div>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">

                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/graph">
                            <i class="fa-solid fa-share-nodes"></i> 知识图谱
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="">

                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/body">
                            <i class="fa-solid fa-file-medical"></i> 身体指标
                        </a>
                    </li>
                </ul>
            </div>
            <form method="get" action="/account">
                <button type="submit" class="btn btn-outline-light">
                    <i class="fa-solid fa-user"></i>
                </button>
            </form>
        </div>
    </nav>

    <div class="container history-container">
        <div class="card mt-4 history-card">
            <div class="card-header" id="answer-head">
                <i class="fa-solid fa-clock-rotate-left"></i> 问答记录
            </div>
            <div class="card-body scrollable-card-body" id="history"></div>
        </div>
    </div>
    <script src="./statics/plugins/bootstrap-5.3.8/js/bootstrap.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/15.0.12/marked.min.js" integrity="sha512-rCQgmUulW6f6QegOvTntKKb5IAoxTpGVCdWqYjkXEpzAns6XUFs8NKVqWe+KQpctp/EoRSFSuykVputqknLYMg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <script src="./statics/js/common.js"></script>
    
    <script id="history-items-json" type="application/json">
        {{ history_items | tojson | safe }}
    </script>

    <script>
        render_history();
    </script>
    <script src="./statics/js/common.js"></script>
